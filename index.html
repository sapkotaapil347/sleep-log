<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Sleep Log" />
  <title>Sleep Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --text: #1a1a1a; --text2: #555551; --text3: #99998f;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --blue-bg: #E6F1FB; --blue-border: #B5D4F4; --blue-icon: #378ADD; --blue-text: #0C447C; --blue-label: #185FA5;
      --purple-bg: #EEEDFE; --purple-border: #CED0F6; --purple-icon: #7F77DD; --purple-text: #3C3489; --purple-label: #534AB7;
      --orange-bg: #FEF3E6; --orange-border: #F6D4A5; --orange-icon: #D4790A; --orange-text: #7C3E0C; --orange-label: #A35810;
      --green: #3B6D11; --green-bg: #EAF3DE; --red: #A32D2D; --red-bg: #FCEBEB;
      --radius-md: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a; --bg2: #252523; --text: #f0efe8; --text2: #b0afa6; --text3: #6e6d65;
        --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
        --blue-bg: #0c2a42; --blue-border: #1a4a72; --blue-icon: #85B7EB; --blue-text: #B5D4F4; --blue-label: #85B7EB;
        --purple-bg: #1e1a42; --purple-border: #3c3489; --purple-icon: #AFA9EC; --purple-text: #CECBF6; --purple-label: #AFA9EC;
        --orange-bg: #2e1e06; --orange-border: #7c4a10; --orange-icon: #E8A94A; --orange-text: #F6D4A5; --orange-label: #E8A94A;
        --green: #C0DD97; --green-bg: #173404; --red: #F09595; --red-bg: #501313;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overscroll-behavior: none; }
    .app { max-width: 480px; margin: 0 auto; padding: 2rem 1.25rem 4rem; display: flex; flex-direction: column; gap: 1.75rem; min-height: 100%; }
    .header { text-align: center; padding-top: 1rem; }
    .header h1 { font-family: 'DM Serif Display', serif; font-size: 32px; font-weight: 400; color: var(--text); letter-spacing: -0.5px; }
    .header .subtitle { font-size: 11px; color: var(--text3); margin-top: 6px; letter-spacing: 0.1em; text-transform: uppercase; }
    .clock { text-align: center; font-size: 14px; color: var(--text2); letter-spacing: 0.04em; }
    .sync-bar { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 11px; color: var(--text3); letter-spacing: 0.05em; min-height: 20px; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
    .sync-bar.synced .sync-dot { background: var(--green); } .sync-bar.synced { color: var(--green); }
    .sync-bar.error .sync-dot { background: var(--red); } .sync-bar.error { color: var(--red); }
    .sync-bar.syncing .sync-dot { background: var(--blue-icon); animation: pulse 1s infinite; } .sync-bar.syncing { color: var(--blue-label); }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .btn-log { border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 2.2rem 1rem; background: var(--bg); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: background 0.12s, transform 0.1s; color: var(--text); touch-action: manipulation; user-select: none; }
    .btn-log:active { transform: scale(0.96); }
    .btn-log.loading { opacity: 0.6; pointer-events: none; }
    .btn-log .icon { font-size: 36px; line-height: 1; }
    .btn-log .label { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); }
    .btn-log .btn-hint { font-size: 11px; color: var(--text3); min-height: 16px; }
    .btn-wake { border-color: var(--blue-border); } .btn-wake:active { background: var(--blue-bg); } .btn-wake .icon { color: var(--blue-icon); }
    .btn-sleep { border-color: var(--purple-border); } .btn-sleep:active { background: var(--purple-bg); } .btn-sleep .icon { color: var(--purple-icon); }
    @media (hover: hover) { .btn-wake:hover{background:var(--blue-bg)} .btn-sleep:hover{background:var(--purple-bg)} }
    .flash { animation: flashAnim 0.35s ease-out; }
    @keyframes flashAnim { 0%{opacity:0.4;transform:scale(0.95)} 100%{opacity:1;transform:scale(1)} }

    /* ── Evan button ── */
    .evan-section { display: flex; flex-direction: column; align-items: center; gap: 10px; }

    .evan-hint {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.3s;
    }
    .evan-hint.hidden { opacity: 0; pointer-events: none; }

    .btn-evan-wrap { position: relative; width: 100%; }

    .btn-evan {
      width: 100%;
      border: 0.5px solid var(--orange-border);
      border-radius: var(--radius-md);
      padding: 13px 18px;
      background: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text2);
      letter-spacing: 0.06em;
      touch-action: manipulation;
      user-select: none;
      position: relative;
      overflow: hidden;
      transition: background 0.12s, transform 0.1s, color 0.2s, border-color 0.2s;
    }

    .btn-evan .evan-icon { color: var(--orange-icon); font-size: 16px; }

    /* locked state */
    .btn-evan.locked {
      opacity: 0.55;
      cursor: not-allowed;
    }

    /* unlocked state */
    .btn-evan.unlocked {
      border-color: var(--orange-border);
      color: var(--orange-text);
      opacity: 1;
    }
    .btn-evan.unlocked:active { background: var(--orange-bg); transform: scale(0.97); }
    @media (hover: hover) { .btn-evan.unlocked:hover { background: var(--orange-bg); } }

    /* long-press progress ring */
    .evan-progress {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .evan-progress svg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 36px;
      height: 36px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .btn-evan.pressing .evan-progress svg { opacity: 1; }

    .evan-progress circle {
      fill: none;
      stroke: var(--orange-icon);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-dasharray: 88;
      stroke-dashoffset: 88;
      transform-origin: center;
      transform: rotate(-90deg);
      transition: stroke-dashoffset 0.05s linear;
    }

    /* lock icon */
    .evan-lock {
      font-size: 13px;
      color: var(--text3);
      transition: opacity 0.2s;
    }
    .btn-evan.unlocked .evan-lock { opacity: 0; width: 0; overflow: hidden; }

    /* auto-lock countdown */
    .evan-countdown {
      font-size: 11px;
      color: var(--orange-label);
      letter-spacing: 0.05em;
      min-height: 16px;
      text-align: center;
      transition: opacity 0.3s;
    }
    .evan-countdown.hidden { opacity: 0; }

    /* log section */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .section-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
    .clear-btn { font-size: 11px; letter-spacing: 0.05em; color: var(--text3); background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: var(--radius-md); font-family: 'DM Mono', monospace; touch-action: manipulation; }
    .clear-btn:active { color: var(--red); background: var(--red-bg); }
    @media (hover: hover) { .clear-btn:hover{color:var(--red);background:var(--red-bg)} }
    .log-empty { text-align: center; padding: 2.5rem 1rem; font-size: 13px; color: var(--text3); border: 0.5px dashed var(--border); border-radius: var(--radius-md); line-height: 1.6; }
    .log-list { display: flex; flex-direction: column; gap: 8px; }
    .log-entry { border-radius: var(--radius-md); border: 0.5px solid var(--border); background: var(--bg); animation: slideIn 0.2s ease-out; overflow: hidden; }
    @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    .entry-main { display: flex; align-items: center; gap: 12px; padding: 11px 14px; font-size: 13px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-wake { background: var(--blue-icon); } .dot-sleep { background: var(--purple-icon); } .dot-evan { background: var(--orange-icon); }
    .entry-type { color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; font-size: 11px; min-width: 48px; }
    .entry-time { color: var(--text); flex: 1; } .entry-date { color: var(--text3); font-size: 11px; }
    .delete-entry { background: none; border: none; cursor: pointer; color: var(--text3); padding: 4px 6px; border-radius: 4px; line-height: 1; font-size: 16px; touch-action: manipulation; }
    .delete-entry:active { color: var(--red); }
    .duration-bar { display: flex; align-items: center; gap: 8px; padding: 6px 14px 7px 34px; border-top: 0.5px solid var(--border); }
    .dur-wake { background: var(--blue-bg); border-top-color: var(--blue-border); }
    .dur-sleep { background: var(--purple-bg); border-top-color: var(--purple-border); }
    .dur-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
    .dur-wake .dur-label { color: var(--blue-label); } .dur-sleep .dur-label { color: var(--purple-label); }
    .dur-value { font-size: 12px; font-weight: 500; }
    .dur-wake .dur-value { color: var(--blue-text); } .dur-sleep .dur-value { color: var(--purple-text); }
    .icon svg { width: 36px; height: 36px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>sleep log</h1>
    <div class="subtitle" id="today-date"></div>
  </div>

  <div class="clock" id="live-clock"></div>

  <div class="sync-bar" id="sync-bar">
    <span class="sync-dot"></span>
    <span id="sync-msg">not connected</span>
  </div>

  <div class="buttons">
    <button class="btn-log btn-wake" id="btn-wake" onclick="logEvent('wake')">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </span>
      <span class="label">woke up</span>
      <span class="btn-hint" id="wake-hint"></span>
    </button>
    <button class="btn-log btn-sleep" id="btn-sleep" onclick="logEvent('sleep')">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </span>
      <span class="label">fell asleep</span>
      <span class="btn-hint" id="sleep-hint"></span>
    </button>
  </div>

  <!-- Evan button -->
  <div class="evan-section">
    <div class="evan-hint" id="evan-hint">
      <span>⟵ hold to unlock</span>
    </div>

    <div class="btn-evan-wrap">
      <button class="btn-evan locked" id="btn-evan"
        onmousedown="evanPressStart(event)"
        ontouchstart="evanPressStart(event)"
        onmouseup="evanPressEnd(event)"
        onmouseleave="evanPressEnd(event)"
        ontouchend="evanPressEnd(event)"
        ontouchcancel="evanPressEnd(event)"
        onclick="evanClick(event)">
        <span class="evan-lock">🔒</span>
        <span class="evan-icon">☀️</span>
        <span>Evan Woke Up!</span>
        <div class="evan-progress">
          <svg viewBox="0 0 36 36" id="evan-ring-svg">
            <circle id="evan-ring" cx="18" cy="18" r="14"/>
          </svg>
        </div>
      </button>
    </div>

    <div class="evan-countdown hidden" id="evan-countdown"></div>
  </div>

  <div>
    <div class="section-header">
      <span class="section-title">log</span>
      <button class="clear-btn" onclick="clearLog()">clear all</button>
    </div>
    <div class="log-empty" id="empty-msg">no entries yet<br>tap a button to start logging</div>
    <div class="log-list" id="log-list"></div>
  </div>
</div>

<script>
  // ── PASTE YOUR APPS SCRIPT URL BETWEEN THE QUOTES BELOW ──────────────────────
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwmBKdVghaCa3FWfUOp0RXh5dh3pLjqAj3BO4-x78buvCKS3c6gHwEmCk68sKm11FKWJA/exec';
  // ─────────────────────────────────────────────────────────────────────────────

  const KEY = 'sleeplog_v3';
  let entries = [];

  // ── Evan button state ──
  const HOLD_MS = 1500;       // hold duration to unlock
  const AUTO_LOCK_MS = 8000;  // seconds before it re-locks
  let evanUnlocked = false;
  let evanPressTimer = null;
  let evanPressStart_ = null;
  let evanLockTimer = null;
  let evanCountdownInterval = null;
  let evanProgressRaf = null;

  function evanPressStart(e) {
    if (evanUnlocked) return; // already unlocked, just wait for click
    e.preventDefault();
    const btn = document.getElementById('btn-evan');
    btn.classList.add('pressing');
    evanPressStart_ = Date.now();

    function animate() {
      const elapsed = Date.now() - evanPressStart_;
      const pct = Math.min(elapsed / HOLD_MS, 1);
      const ring = document.getElementById('evan-ring');
      ring.style.strokeDashoffset = 88 - pct * 88;
      if (pct < 1) {
        evanProgressRaf = requestAnimationFrame(animate);
      }
    }
    evanProgressRaf = requestAnimationFrame(animate);

    evanPressTimer = setTimeout(() => {
      unlockEvan();
    }, HOLD_MS);
  }

  function evanPressEnd(e) {
    if (evanUnlocked) return;
    clearTimeout(evanPressTimer);
    cancelAnimationFrame(evanProgressRaf);
    const btn = document.getElementById('btn-evan');
    btn.classList.remove('pressing');
    const ring = document.getElementById('evan-ring');
    ring.style.strokeDashoffset = 88;
  }

  function unlockEvan() {
    evanUnlocked = true;
    const btn = document.getElementById('btn-evan');
    btn.classList.remove('locked', 'pressing');
    btn.classList.add('unlocked');
    const ring = document.getElementById('evan-ring');
    ring.style.strokeDashoffset = 88;

    document.getElementById('evan-hint').classList.add('hidden');
    document.getElementById('evan-ring-svg').style.opacity = 0;

    // start auto-lock countdown
    startEvanCountdown();
  }

  function lockEvan() {
    evanUnlocked = false;
    const btn = document.getElementById('btn-evan');
    btn.classList.remove('unlocked');
    btn.classList.add('locked');
    document.getElementById('evan-hint').classList.remove('hidden');
    document.getElementById('evan-countdown').classList.add('hidden');
    document.getElementById('evan-countdown').textContent = '';
    clearInterval(evanCountdownInterval);
    clearTimeout(evanLockTimer);
  }

  function startEvanCountdown() {
    const cd = document.getElementById('evan-countdown');
    cd.classList.remove('hidden');
    let remaining = Math.ceil(AUTO_LOCK_MS / 1000);
    cd.textContent = `locks in ${remaining}s`;
    evanCountdownInterval = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(evanCountdownInterval);
        cd.textContent = '';
        cd.classList.add('hidden');
      } else {
        cd.textContent = `locks in ${remaining}s`;
      }
    }, 1000);
    evanLockTimer = setTimeout(lockEvan, AUTO_LOCK_MS);
  }

  function evanClick(e) {
    if (!evanUnlocked) return; // prevent accidental taps while locked
    // reset auto-lock timer on each tap
    clearTimeout(evanLockTimer);
    clearInterval(evanCountdownInterval);
    logEvent('evan');
    // re-start countdown after log
    startEvanCountdown();

    const btn = document.getElementById('btn-evan');
    btn.classList.remove('flash');
    void btn.offsetWidth;
    btn.classList.add('flash');
  }

  // ── Sync helpers ──
  function localSave() { try { localStorage.setItem(KEY, JSON.stringify(entries)); } catch {} }
  function localLoad() { try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch { return []; } }

  function setSyncStatus(state, msg) {
    const bar = document.getElementById('sync-bar');
    bar.className = 'sync-bar ' + state;
    document.getElementById('sync-msg').textContent = msg;
  }

  const hasScript = SCRIPT_URL && SCRIPT_URL !== 'YOUR_APPS_SCRIPT_URL_HERE';

  async function fetchEntries() {
    if (!hasScript) { entries = localLoad(); renderLog(); setSyncStatus('', 'local only'); return; }
    setSyncStatus('syncing', 'loading...');
    try {
      const res = await fetch(SCRIPT_URL + '?action=getAll');
      const data = await res.json();
      if (!data.ok) throw new Error();
      entries = data.entries.map(e => ({ id: e.id, type: e.type, ts: Number(e.ts) }));
      entries.sort((a, b) => a.ts - b.ts);
      localSave();
      setSyncStatus('synced', 'synced');
    } catch {
      entries = localLoad();
      setSyncStatus('error', 'offline — showing local');
    }
    renderLog();
  }

  async function pushEntry(entry) {
    if (!hasScript) return entry;
    try {
      const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: entry.type, ts: entry.ts }) });
      const data = await res.json();
      if (data.ok) { entry.id = data.id; setSyncStatus('synced', 'synced'); }
    } catch { setSyncStatus('error', 'saved locally, sync failed'); }
    return entry;
  }

  async function deleteRemote(id) {
    if (!hasScript || !id) return;
    try { await fetch(SCRIPT_URL + '?action=delete&id=' + encodeURIComponent(id)); setSyncStatus('synced', 'synced'); }
    catch { setSyncStatus('error', 'local delete only'); }
  }

  async function clearRemote() {
    if (!hasScript) return;
    try { await fetch(SCRIPT_URL + '?action=clear'); setSyncStatus('synced', 'synced'); }
    catch { setSyncStatus('error', 'local clear only'); }
  }

  // ── Formatting ──
  function fmtTime(ts) { return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }); }

  function fmtDate(ts) {
    const d = new Date(ts), today = new Date(), yest = new Date(today);
    yest.setDate(today.getDate() - 1);
    if (d.toDateString() === today.toDateString()) return 'today';
    if (d.toDateString() === yest.toDateString()) return 'yesterday';
    return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
  }

  function fmtDur(ms) {
    const t = Math.round(ms / 60000), h = Math.floor(t / 60), m = t % 60;
    if (h === 0) return m + 'm'; if (m === 0) return h + 'h'; return h + 'h ' + m + 'm';
  }

  function getPrev(idx, type) {
    for (let i = idx - 1; i >= 0; i--) { if (entries[i].type === type) return entries[i]; }
    return null;
  }

  function labelFor(type) {
    if (type === 'wake') return 'woke';
    if (type === 'sleep') return 'sleep';
    if (type === 'evan') return 'evan';
    return type;
  }

  function renderLog() {
    const list = document.getElementById('log-list');
    const empty = document.getElementById('empty-msg');
    list.innerHTML = '';
    if (entries.length === 0) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    [...entries].reverse().forEach((e, revIdx) => {
      const realIdx = entries.length - 1 - revIdx;
      let durHTML = '';

      if (e.type === 'wake') {
        const prev = getPrev(realIdx, 'sleep');
        if (prev) durHTML = `<div class="duration-bar dur-wake"><span class="dur-label">slept for</span><span class="dur-value">${fmtDur(e.ts - prev.ts)}</span></div>`;
      } else if (e.type === 'sleep') {
        const prev = getPrev(realIdx, 'wake');
        if (prev) durHTML = `<div class="duration-bar dur-sleep"><span class="dur-label">awake for</span><span class="dur-value">${fmtDur(e.ts - prev.ts)}</span></div>`;
      }

      const safeId = encodeURIComponent(e.id || '');
      const div = document.createElement('div');
      div.className = 'log-entry';
      div.innerHTML = `
        <div class="entry-main">
          <span class="dot dot-${e.type}"></span>
          <span class="entry-type">${labelFor(e.type)}</span>
          <span class="entry-time">${fmtTime(e.ts)}</span>
          <span class="entry-date">${fmtDate(e.ts)}</span>
          <button class="delete-entry" aria-label="delete" onclick="deleteEntry(${realIdx},'${safeId}')">✕</button>
        </div>${durHTML}`;
      list.appendChild(div);
    });

    updateHints();
  }

  function updateHints() {
    const last = entries.length ? entries[entries.length - 1] : null;
    const wh = document.getElementById('wake-hint'), sh = document.getElementById('sleep-hint');
    if (!last) { wh.textContent = ''; sh.textContent = ''; return; }
    const now = Date.now();
    if (last.type === 'sleep') { wh.textContent = 'slept ' + fmtDur(now - last.ts); sh.textContent = ''; }
    else if (last.type === 'wake') { sh.textContent = 'awake ' + fmtDur(now - last.ts); wh.textContent = ''; }
    else { wh.textContent = ''; sh.textContent = ''; }
  }

  async function logEvent(type) {
    const btnId = type === 'evan' ? 'btn-evan' : 'btn-' + type;
    const btn = document.getElementById(btnId);
    if (type !== 'evan') btn.classList.add('loading');
    let entry = { type, ts: Date.now(), id: null };
    entries.push(entry);
    localSave();
    renderLog();
    setSyncStatus('syncing', 'saving...');
    entry = await pushEntry(entry);
    localSave();
    if (type !== 'evan') {
      btn.classList.remove('loading');
      btn.classList.remove('flash');
      void btn.offsetWidth;
      btn.classList.add('flash');
    }
  }

  async function deleteEntry(idx, encodedId) {
    const id = decodeURIComponent(encodedId);
    entries.splice(idx, 1);
    localSave();
    renderLog();
    setSyncStatus('syncing', 'deleting...');
    await deleteRemote(id);
  }

  async function clearLog() {
    if (!entries.length) return;
    if (!confirm('Clear all entries?')) return;
    entries = [];
    localSave();
    renderLog();
    setSyncStatus('syncing', 'clearing...');
    await clearRemote();
  }

  function tick() {
    document.getElementById('live-clock').textContent =
      new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
    updateHints();
  }

  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });

  if (!hasScript) setSyncStatus('', 'local only — no sync configured');
  tick();
  setInterval(tick, 1000);
  fetchEntries();
</script>
</body>
</html>
